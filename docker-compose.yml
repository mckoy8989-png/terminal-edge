# =============================================================================
# Terminal Edge — Development Stack
# Usage:  docker compose up -d
# Secrets: Replace {{...}} placeholders with real values or use .env file.
# =============================================================================
version: "3.9"

services:
  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "{{POSTGRES_USER}}"          # e.g. terminal_edge
      POSTGRES_PASSWORD: "{{POSTGRES_PASSWORD}}"  # e.g. devpassword123
      POSTGRES_DB: terminal_edge
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass "{{REDIS_PASSWORD}}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "{{REDIS_PASSWORD}}", "ping"]
      interval: 5s
      retries: 5

  # ── n8n (Workflow Automation) ───────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "{{N8N_USER}}"          # e.g. admin
      N8N_BASIC_AUTH_PASSWORD: "{{N8N_PASSWORD}}"   # e.g. n8ndevpass
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: terminal_edge
      DB_POSTGRESDB_USER: "{{POSTGRES_USER}}"
      DB_POSTGRESDB_PASSWORD: "{{POSTGRES_PASSWORD}}"
      WEBHOOK_URL: "http://localhost:5678/"
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Qdrant (Vector DB) ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Worker (Bot / Workflow Executor) ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@postgres:5432/terminal_edge"
      REDIS_URL: "redis://:{{REDIS_PASSWORD}}@redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
      OPENAI_API_KEY: "{{OPENAI_API_KEY}}"
      ANTHROPIC_API_KEY: "{{ANTHROPIC_API_KEY}}"
      STRIPE_SECRET_KEY: "{{STRIPE_SECRET_KEY}}"
      SANDBOX_IMAGE: "terminal-edge/bot-runner:latest"
      LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Local LLM Runner (Ollama stub) ─────────────────────────────────────────
  local_runner:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── API Gateway / Orchestrator (stub) ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@postgres:5432/terminal_edge"
      REDIS_URL: "redis://:{{REDIS_PASSWORD}}@redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
      LOCAL_LLM_URL: "http://local_runner:11434"
      N8N_URL: "http://n8n:5678"
      JWT_SECRET: "{{JWT_SECRET}}"
      OPENAI_API_KEY: "{{OPENAI_API_KEY}}"
      ANTHROPIC_API_KEY: "{{ANTHROPIC_API_KEY}}"
      STRIPE_SECRET_KEY: "{{STRIPE_SECRET_KEY}}"
      STRIPE_WEBHOOK_SECRET: "{{STRIPE_WEBHOOK_SECRET}}"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_data:
  qdrant_data:
  ollama_data:
